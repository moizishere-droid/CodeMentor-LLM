# Model
model:
  base_model: "meta-llama/Meta-Llama-3-8B-Instruct"
  hub_model_id: "YOUR_HF_USERNAME/codementor-llm"

# Quantization
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

# LoRA
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  task_type: "CAUSAL_LM"

# SFT Training
sft_training:
  dataset_id: "sahil2801/CodeAlpaca-20k"
  output_dir: "./checkpoints/sft"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_ratio: 0.05
  fp16: true
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "epoch"
  max_seq_length: 2048
  report_to: "wandb"

# DPO Training
dpo_training:
  output_dir: "./checkpoints/dpo"
  beta: 0.1
  learning_rate: 5e-5
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  fp16: true
  logging_steps: 10
  report_to: "wandb"

# Inference
inference:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: true

# API
api:
  host: "0.0.0.0"
  port: 8000

# Frontend
frontend:
  api_url: "http://localhost:8000"
  port: 8501